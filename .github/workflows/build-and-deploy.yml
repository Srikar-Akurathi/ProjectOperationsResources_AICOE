name: Build and Deploy Plugin + Azure Function
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ── Job 1: Plugin + Solution Deploy ─────────────────────────
  build-and-deploy-plugin:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore ProjectOperationsPlugins/ProjectOperationsPlugins.sln

    - name: Build plugin DLL
      run: |
        msbuild ProjectOperationsPlugins/ProjectOperationsPlugins.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Copy DLL to solution
      shell: pwsh
      run: |
        $dll = "ProjectOperationsPlugins/ProjectOperationsPlugins/bin/Release/ProjectOperationsPlugins.dll"
        $dest = "solution/PluginAssemblies/ProjectOperationsPlugins-447C389F-7518-4917-AAED-CF6679124AFA/"
        Copy-Item $dll $dest -Force

    - name: Install PAC CLI
      shell: pwsh
      run: |
        nuget install Microsoft.PowerApps.CLI -OutputDirectory pac
        $pac = Get-ChildItem -Path pac -Recurse -Filter "pac.exe" | Select-Object -First 1
        Write-Host "PAC CLI: $($pac.FullName)"
        echo "PAC_PATH=$($pac.FullName)" >> $env:GITHUB_ENV

    - name: Pack solution
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path solution_output
        & $env:PAC_PATH solution pack `
          --zipfile solution_output/ProjectOperationsPlugins.zip `
          --folder solution `
          --packagetype Unmanaged

    - name: Import solution to Dataverse
      shell: pwsh
      run: |
        & $env:PAC_PATH auth create `
          --url $env:DATAVERSE_URL `
          --applicationId $env:CLIENT_ID `
          --clientSecret $env:CLIENT_SECRET `
          --tenant $env:TENANT_ID
        & $env:PAC_PATH solution import `
          --path solution_output/ProjectOperationsPlugins.zip `
          --activate-plugins true `
          --force-overwrite true
      env:
        DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        TENANT_ID: ${{ secrets.TENANT_ID }}

    - name: Upload solution zip
      uses: actions/upload-artifact@v5
      with:
        name: ProjectOperationsPlugins-solution
        path: solution_output/ProjectOperationsPlugins.zip

  # ── Job 2: Azure Function Deploy ────────────────────────────
  deploy-azure-function:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Azure Function
      run: |
        cd ProjectOperationsAzFunc
        dotnet restore
        dotnet build --configuration Release
        dotnet publish --configuration Release --output ./publish

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: project-ops-azfunc
        package: ProjectOperationsAzFunc/publish
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}